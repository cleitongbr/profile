<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleitongbr - Perfil Digital</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --primary-glow: #8a2be2;
            --secondary-glow: #00d2ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #050505;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 2rem 1rem;
            position: relative;
        }

        /* Fundo Dinâmico (Blobs) */
        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .blob {
            position: absolute;
            filter: blur(90px);
            border-radius: 50%;
            opacity: 0.6;
            animation: float 15s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--primary-glow);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: var(--secondary-glow);
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }
        
        .blob-3 {
            width: 300px;
            height: 300px;
            background: #ff007a;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -2s;
            animation-duration: 20s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* Layout Grid */
        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            z-index: 1;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 4fr 5fr;
                grid-template-rows: auto 1fr;
            }
            .card-profile { grid-column: 1; grid-row: 1; }
            .card-about { grid-column: 1; grid-row: 2; }
            .card-links { grid-column: 2; grid-row: 1 / span 2; }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 2rem;
            box-shadow: var(--glass-shadow);
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s ease, background 0.3s ease;
            transform-style: preserve-3d;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            border-radius: inherit;
            pointer-events: none;
            z-index: 1;
        }

        .glass-card-content {
            position: relative;
            z-index: 2;
            transform: translateZ(30px); /* 3D effect depth */
        }

        /* Card Profile */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .avatar-container {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fff, #aaa);
            padding: 3px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #222;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="%23fff"><circle cx="50" cy="40" r="20"/><path d="M20 90 Q 50 60 80 90 Z"/></svg>');
            background-size: cover;
            background-position: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #bbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Card About */
        .card-about h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
        }

        .card-about p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .card-about .gemini-credit {
            font-size: 0.8rem;
            color: var(--text-muted);
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-style: italic;
        }

        /* Card Links */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            height: 100%;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.2rem 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .link-item::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s ease;
        }

        .link-item:hover {
            transform: translateY(-3px) scale(1.02);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .link-item:hover::before {
            left: 100%;
        }

        .link-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .link-item:hover .link-icon {
            transform: scale(1.2);
        }

        /* Cores de Hover Específicas */
        .link-item.youtube:hover { box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); border-color: #ff0000; }
        .link-item.tiktok:hover { box-shadow: 0 0 20px rgba(0, 242, 254, 0.3); border-color: #00f2fe; }

        .link-item.instagram:hover { box-shadow: 0 0 20px rgba(225, 48, 108, 0.3); border-color: #e1306c; }

        .link-item.github:hover { box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); border-color: #ffffff; }

        .link-item.reddit:hover { box-shadow: 0 0 20px rgba(255, 69, 0, 0.3); border-color: #ff4500; }
        .link-item.pixgg:hover { box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); border-color: #00ff88; }

        /* Scrollbar suave */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

    <!-- Script para Efeito 3D (Tilt) Premium -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.tilt-card');

            // Verifica se é mobile (se for touch, o efeito 3D pode ser suavizado ou ignorado para performance)
            const isTouchDevice = () => 'ontouchstart' in window || navigator.maxTouchPoints > 0;

            if (!isTouchDevice()) {
                cards.forEach(card => {
                    const content = card.querySelector('.glass-card-content');
                    
                    card.addEventListener('mousemove', e => {
                        const rect = card.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        
                        const centerX = rect.width / 2;
                        const centerY = rect.height / 2;
                        
                        // Fator de rotação - quanto menor o divisor, mais forte o efeito
                        const rotateX = ((y - centerY) / centerY) * -5;
                        const rotateY = ((x - centerX) / centerX) * 5;
                        
                        card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                        
                        // Movimento oposto suave do conteúdo interno para efeito parallax
                        if(content) {
                            content.style.transform = `translateZ(40px) translateX(${rotateY * -0.5}px) translateY(${rotateX * 0.5}px)`;
                        }
                    });

                    card.addEventListener('mouseleave', () => {
                        card.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)`;
                        if(content) {
                            content.style.transform = `translateZ(30px) translateX(0) translateY(0)`;
                        }
                    });
                });
            }
        });
    </script>
</body>
</html>
